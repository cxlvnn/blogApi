services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blogapi-app
    ports:
      - "8000:8000"
    volumes:
      - storage:/var/www/storage
      - database:/var/www/database
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      BROADCAST_CONNECTION: log
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
    networks:
      - blogapi-network
    restart: unless-stopped

  # Optional: MySQL service (commented out by default)
  # Uncomment and switch DB_CONNECTION to mysql to use MySQL instead of SQLite
  # db:
  #   image: mysql:8.0
  #   container_name: blogapi-db
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpass
  #     MYSQL_DATABASE: blogapi
  #     MYSQL_USER: blogapi
  #     MYSQL_PASSWORD: secret
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - db_data:/var/lib/mysql
  #   networks:
  #     - blogapi-network

volumes:
  storage:
  database:
  # db_data:

networks:
  blogapi-network:
    driver: bridge
